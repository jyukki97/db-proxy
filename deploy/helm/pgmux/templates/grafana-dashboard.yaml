{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgmux.fullname" . }}-grafana-dashboard
  labels:
    {{- include "pgmux.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  pgmux-overview.json: |-
    {{- .Files.Get "dashboards/pgmux-overview.json" | nindent 4 }}
{{- end }}
